version: "3.9"

services:

  airflow:
    image: apache/airflow:2.8.1
    container_name: airflow
    restart: always
    depends_on:
      - metadata-db
      - prod-db
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow-script/entrypoint.sh:/opt/airflow/entrypoint.sh
      - ./airflow/config/webserver_config.py:/opt/airflow/webserver_config.py
      - /var/run/docker.sock:/var/run/docker.sock

    entrypoint: ["/bin/bash", "/opt/airflow/entrypoint.sh"]

    ports:
      - "8090:8080"
    networks:
      - default

  metadata-db:
    image: postgres:13
    container_name: elt-pipeline-metadata-db
    environment:
      POSTGRES_USER: metadata_user
      POSTGRES_PASSWORD: metadata_pass
      POSTGRES_DB: metadata_db
    volumes:
      - metadatapgdata:/var/lib/postgresql/data
      - ./metadata-db-init:/docker-entrypoint-initdb.d
    ports:
      - "5434:5432"  # Use different port from other DBs
    networks:
      - default

  file-watcher:
    build: ./file-watcher
    volumes:
      - ./data:/app/source_data
    depends_on:
      - metadata-db
    environment:
      - PYTHONUNBUFFERED=1

  prod-db:
    image: postgres:13
    container_name: elt-pipeline-prod-db
    environment:
      POSTGRES_USER: prod_user
      POSTGRES_PASSWORD: prod_pass
      POSTGRES_DB: analytics_db
    ports:
      - "5433:5432"
    volumes:
      - targetdata:/var/lib/postgresql/data
    networks:
      - default


  minio:
    image: minio/minio:latest
    container_name: elt-pipeline-minio
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - default

  minio-init:
    image: minio/mc:latest
    container_name: elt-pipeline-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio_admin minio_password &&
      mc mb -p local/elt-pipeline-lake &&
      echo 'Bucket elt-pipeline-lake ready' &&
      mc mb -p local/warehouse &&
      echo 'Bucket warehouse ready'
      "
    networks:
      - default

  polaris-db:
    image: postgres:16
    container_name: elt-pipeline-polaris-db

    environment:
      POSTGRES_DB: polaris
      POSTGRES_USER: polaris
      POSTGRES_PASSWORD: polaris

    ports:
      - "5435:5432"

    volumes:
      - polaris_pgdata:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U polaris"]
      interval: 10s
      timeout: 5s
      retries: 5

    networks:
      - default

  polaris-admin:
    image: apache/polaris-admin-tool:1.6.0
    container_name: elt-pipeline-polaris-admin

    depends_on:
      polaris-db:
        condition: service_healthy

    environment:
      POLARIS_PERSISTENCE_TYPE: relational-jdbc
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: polaris
      QUARKUS_DATASOURCE_PASSWORD: polaris
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://polaris-db:5432/polaris

    command:
      - bootstrap
      - -r
      - default-realm
      - -c
      - default-realm,root,s3cr3t

    restart: "no"

    networks:
      - default


  polaris:
    image: apache/polaris:1.6.0
    container_name: elt-pipeline-polaris

    environment:
      AWS_ACCESS_KEY_ID: minio_admin
      AWS_SECRET_ACCESS_KEY: minio_password
      AWS_REGION: us-east-1
      AWS_ENDPOINT_URL_S3: http://minio:9000
      AWS_ENDPOINT_URL_STS: http://minio:9000
      POLARIS_BOOTSTRAP_CREDENTIALS: default-realm,root,s3cr3t
      polaris.features.DROP_WITH_PURGE_ENABLED: "true"
      polaris.realm-context.realms: default-realm
      QUARKUS_DATASOURCE_DB_KIND: postgresql
      QUARKUS_DATASOURCE_USERNAME: polaris
      QUARKUS_DATASOURCE_PASSWORD: polaris
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://polaris-db:5432/polaris
      POLARIS_PERSISTENCE_TYPE: relational-jdbc

    ports:
      - "8181:8181"   # REST catalog API
      - "8182:8182"   # Management / metrics
    depends_on:
      minio:
        condition: service_healthy
      polaris-admin:
        condition: service_completed_successfully

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8182/q/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - default

  polaris-setup:
    image: curlimages/curl:8.12.1
    container_name: elt-pipeline-polaris-setup

    depends_on:
      polaris:
        condition: service_healthy

    entrypoint:
      - /bin/sh
      - -ec
      - |
          echo "Waiting for Polaris..."

          until curl -sf http://polaris:8182/q/health >/dev/null; do
            sleep 2
          done

          echo "Polaris is healthy."

          TOKEN=$$(curl -s -X POST \
            http://polaris:8181/api/catalog/v1/oauth/tokens \
            -d "grant_type=client_credentials" \
            -d "client_id=root" \
            -d "client_secret=s3cr3t" \
            -d "scope=PRINCIPAL_ROLE:ALL" \
            | sed -n 's/.*"access_token":"\([^"]*\)".*/\1/p')

          if [ -z "$$TOKEN" ]; then
            echo "Failed to obtain OAuth token."
            exit 1
          fi

          echo "Successfully obtained token."

          STATUS=$$(curl -s -o /tmp/catalog-response.json \
            -w "%{http_code}" \
            -X POST http://polaris:8181/api/management/v1/catalogs \
            -H "Authorization: Bearer $$TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "catalog": {
                "name": "quickstart_catalog",
                "type": "INTERNAL",
                "properties": {
                  "default-base-location": "s3://warehouse/"
                },
                "storageConfigInfo": {
                  "storageType": "S3",
                  "allowedLocations": [
                    "s3://warehouse/"
                  ],
                  "endpoint": "http://minio:9000",
                  "endpointInternal": "http://minio:9000",
                  "pathStyleAccess": true,
                  "stsUnavailable": true
                }
              }
            }')

          if [ "$$STATUS" = "200" ] || [ "$$STATUS" = "201" ]; then
            echo "Catalog created successfully."
          elif [ "$$STATUS" = "409" ]; then
            echo "Catalog already exists."
          else
            echo "Catalog creation failed (HTTP $$STATUS)"
            cat /tmp/catalog-response.json
            exit 1
          fi

          echo "Polaris setup completed."

    networks:
      - default


  kafka:
    image: apache/kafka:latest
    container_name: elt-pipeline-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s
    networks:
      - default
 
  flink-jobmanager:
    image: flink:1.19-scala_2.12
    container_name: elt-pipeline-flink-jobmanager
    command: jobmanager
    depends_on:
      kafka:
        condition: service_healthy
      polaris:
        condition: service_healthy
    ports:
      - "8091:8081"   # Flink Web UI
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
    networks:
      - default
 
  flink-taskmanager:
    image: flink:1.19-scala_2.12
    container_name: elt-pipeline-flink-taskmanager
    command: taskmanager
    depends_on:
      - flink-jobmanager
    environment:
      FLINK_PROPERTIES: |
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2
    networks:
      - default


  superset:
    image: apache/superset:3.0.1
    container_name: superset
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=your_superset_secret_key
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - ADMIN_FIRST_NAME=Admin
      - ADMIN_LAST_NAME=User
      - ADMIN_EMAIL=admin@superset.com
    depends_on:
      - prod-db
    volumes:
      - superset_home:/app/superset_home
      - ./superset/config/superset_config.py:/app/pythonpath/superset_config.py
    command: >
      /bin/bash -c "
      superset db upgrade &&
      superset fab create-admin --username admin --firstname Admin --lastname User --email admin@superset.com --password admin &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088"


volumes:
  targetdata:
  metadatapgdata:
  superset_home:
  miniodata:
  polaris_pgdata: